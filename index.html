<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foundation Flashcards</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f6fa;
  margin: 0;
  padding: 20px;
  text-align: center;
}

.card {
  background: white;
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  cursor: pointer;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.02);
}

.category {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #555;
}

.content {
  font-size: 18px;
  font-weight: bold;
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 18px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.next { background: #4F81BD; color: white; }
.prev { background: #999; color: white; }
</style>
</head>

<body>

<h2>Foundation Project Flashcards</h2>

<div id="card" class="card" onclick="flipCard()">
  <div class="category" id="category"></div>
  <div class="content" id="content"></div>
</div>

<div class="controls">
  <button class="prev" onclick="prevCard()">Previous</button>
  <button class="next" onclick="nextCard()">Next</button>
</div>

<script>
const cards = [
{
  category: "Basement",
  front: "Water signs on basement floor & walls.",
  back: "Project: Control Ground Water Seepage (CGWS)"
},
{
  category: "Basement",
  front: "Bowed basement walls or horizontal cracks.",
  back: "Project: Permanently Stabilize Your Walls (PSYW)"
},
{
  category: "Crawlspace",
  front: "High humidity & musty smell.",
  back: "Project: Control The Environment (CTE)"
},
{
  category: "Crawlspace",
  front: "Sloped or shaky floors.",
  back: "Project: Permanently Stabilize Floor System (PSFF)"
},
{
  category: "Slab",
  front: "Uneven concrete walkways.",
  back: "Project: Stabilize Your Concrete (SYC)"
}
];

let current = 0;
let flipped = false;

function render() {
  document.getElementById("category").innerText = cards[current].category;
  document.getElementById("content").innerText = flipped ? cards[current].back : cards[current].front;
}

function flipCard() {
  flipped = !flipped;
  render();
}

function nextCard() {
  flipped = false;
  current = (current + 1) % cards.length;
  render();
}

function prevCard() {
  flipped = false;
  current = (current - 1 + cards.length) % cards.length;
  render();
}

render();
</script>

</body>
</html>
